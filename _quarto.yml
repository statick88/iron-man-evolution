project:
  type: book
  output-dir: docs

book:
  title: "Iron Man Evolution: De la Cueva al Nanotech"
  author: "Diego Saavedra García"
  output-file: "iron-man-evolution"  
  date: today
  date-format: medium
  favicon: images/iron-man-evolution.svg
  description: "Curso de desarrollo con Inteligencia Artificial como Tony Stark: desde scripts básicos hasta Software Driver Development"
  keyword: AI, Agentes, MCP, Engram, SDD, Gentle AI Stack, Iron Man
  url: https://github.com/statick88/curso-iron-man-evolution
  page-navigation: true
  sidebar: 
    logo: images/iron-man-evolution.svg
    search: true
    collapse-level: 1

  repo-subdir: book
  sharing: [twitter, linkedin, facebook]
  downloads: [pdf, epub]
  image: images/iron-man-evolution.svg

  page-footer:
    center: 
      - text: "Acerca del Autor"
        href: about.qmd
      - text: "Licencia"
        href: license.qmd
      - text: "Gentle AI Stack"
        href: https://github.com/Gentleman-Programming/gentle-ai
        
  chapters:
    - portada.qmd
    - dedicatoria.qmd
    - prefacio.qmd
    - agradecimientos.qmd
    - index.qmd
    - contenido/prerrequisitos.qmd
    - part: "🏚️ Nivel 1: El Demo en la Cueva"
      chapters:
        - contenido/nivel1.qmd
        - labs/lab-nivel1.md
        - labs/boss-fight1.md
    - part: "⚙️ Nivel 2: El Mark I"
      chapters:
        - contenido/nivel2.qmd
        - labs/lab-nivel2.md
        - labs/boss-fight2.md
    - part: "🔧 Nivel 3: De la Chatarra al Artefacto"
      chapters:
        - contenido/nivel3.qmd
        - labs/lab-nivel3.md
        - labs/boss-fight3.md
    - part: "🧠 Nivel 4: El Jarvis Primordial"
      chapters:
        - contenido/nivel4.qmd
        - labs/lab-nivel4.md
        - labs/boss-fight4.md
    - part: "🛡️ Nivel 5: De Agente a Arquitecto"
      chapters:
        - contenido/nivel5.qmd
        - labs/lab-nivel5.md
        - labs/boss-fight5.md
    - part: "🧬 Nivel 6: El Nanotech Viviente"
      chapters:
        - contenido/nivel6.qmd
        - labs/lab-nivel6.md
        - labs/boss-fight6.md
    - part: "📚 Referencias y Recursos"
      chapters:
        - recursos/gentle-ai-stack.md
        - recursos/engram.md
        - recursos/mcp.md
        - recursos/skills.md
        - recursos/sdd.md
        - recursos/herramientas-ia.md
    - part: "ℹ️ Información"
      chapters:
        - about.qmd
        - license.qmd

bibliography: references.bib
biblio-style: "apalike"

format:
  html:
    theme: solar
    number-sections: true
    number-depth: 4
    link-external-icon: true
    link-external-newwindow: true
    css: css/styles.css
    code-fold: show
    code-tools: true
    code-copy: true
    highlight-style: github

  pdf:
    documentclass: scrreprt
    classoption: ["onepage", "openany"]
    papersize: a4
    toc: true
    margin-top: 35mm
    margin-left: 30mm
    margin-bottom: 30mm
    margin-right: 30mm
    titlepage-geometry: 
      - top=35mm
      - bottom=30mm
      - right=30mm
      - left=30mm
    code-block: true
    code-block-width: 0.9\textwidth

  epub:
    cover-image: images/iron-man-evolution-cover.svg
    author: "Diego Saavedra García"
    publisher: "Stark Industries Publishing"
    rights: "© 2026 Diego Saavedra García. Todos los derechos reservados."

# Configuración de notebooks interactivos (para labs)
execute:
  echo: true
  eval: true
  warning: false
  message: false

# Configuración de mermaid para diagramas
mermaid:
  theme: dark

# Configuración deCallouts
callout-appearance: simple
callout-icon: true

# Configuración de tabs
tabs:
  style: pills
  contents:
    - text: "HTML"
      href: index.html
    - text: "PDF"
      href: iron-man-evolution.pdf
    - text: "EPUB"
      href: iron-man-evolution.epub